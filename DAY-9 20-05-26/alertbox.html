<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Box Example</title>

    <style>
        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right, #af4ffed3, #1195c9);
            font-family:Arial, sans-serif;
        }

        .container{
            text-align:center;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 4px 15px rgba(0,0,0,0.3);
        }

        h1{
            color:#333;
            margin-bottom:20px;
        }

        button{
            padding:12px 25px;
            font-size:18px;
            border:none;
            border-radius:8px;
            background:#4c00ff;
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#3331aa;
            transform:scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>JavaScript Alert Box</h1>

        <button onclick="showAlert()">
            Click Me
        </button>
    </div>

    <script>
        function showAlert()
        {
            alert("Welcome to JavaScript Alert Box!");
        }
    </script>

</body>
</html>
