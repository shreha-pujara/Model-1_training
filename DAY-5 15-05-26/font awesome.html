<!DOCTYPE html>
<html>
<head>
    <title>Awesome Font Awesome Hover Effects</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#000428,#004e92);
            font-family:Arial;
        }

        .icon-box{
            display:flex;
            gap:35px;
        }

        .icon-box a{
            width:90px;
            height:90px;
            background:white;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            text-decoration:none;
            position:relative;
            overflow:hidden;
            transition:0.5s;
            box-shadow:0 5px 20px rgba(0,0,0,0.4);
        }

        .icon-box a i{
            font-size:38px;
            color:#333;
            transition:0.5s;
            z-index:2;
        }

        .icon-box a::before{
            content:"";
            position:absolute;
            width:100%;
            height:100%;
            background:#ff0080;
            top:100%;
            left:0;
            transition:0.5s;
            border-radius:50%;
        }

        .icon-box a:hover::before{
            top:0;
        }

        .icon-box a:hover i{
            color:white;
            transform:rotateY(360deg) scale(1.2);
        }

        .icon-box a:nth-child(2)::before{
            background:#1877f2;
        }

        .icon-box a:nth-child(3)::before{
            background:#000;
        }

        .icon-box a:nth-child(4)::before{
            background:#ff0000;
        }

        /* Heart Background */
        .icon-box a:nth-child(5)::before{
            background:#ff1744;
        }

        /* Heart Beating Animation */
        .icon-box a.heart:hover i{
            animation:beat 0.6s infinite;
        }

        @keyframes beat{

            0%{
                transform:scale(1);
            }

            25%{
                transform:scale(1.4);
            }

            50%{
                transform:scale(1);
            }

            75%{
                transform:scale(1.4);
            }

            100%{
                transform:scale(1);
            }
        }

    </style>
</head>

<body>

    <div class="icon-box">

        <a href="#">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="#">
            <i class="fa-brands fa-facebook-f"></i>
        </a>

        <a href="#">
            <i class="fa-brands fa-github"></i>
        </a>

        <a href="#">
            <i class="fa-brands fa-youtube"></i>
        </a>

        <!-- Heart Icon -->
        <a href="#" class="heart">
            <i class="fa-solid fa-heart"></i>
        </a>

    </div>

</body>
</html>
