<!DOCTYPE html>
<html>
<head>
    <title>Proper Video Background</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            overflow:hidden;
        }

        .video-bg{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:-1;
        }

        .video-bg video{
            width:100%;
            height:100%;
            object-fit:cover;
        }
        .content{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
            background:rgba(0,0,0,0.4);
        }

        .content h1{
            font-size:70px;
            letter-spacing:4px;
            margin-bottom:15px;
            text-shadow:0 0 15px black;
        }

        .content p{
            font-size:24px;
            margin-bottom:25px;
        }

        .btn{
            padding:14px 35px;
            border:none;
            border-radius:30px;
            background:#ff1744;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.4s;
        }

        .btn:hover{
            background:white;
            color:#ff1744;
            transform:scale(1.1);
        }

    </style>
</head>

<body>
    <div class="video-bg">

        <video autoplay muted loop>
            <source src="video.mp4" type="video/mp4">
        </video>

    </div>
    <div class="content">

        <h1>EXPLORE NATURE</h1>
        <p>Beautiful Fullscreen Video Background</p>

        <button class="btn">Get Started</button>

    </div>

</body>
</html>
