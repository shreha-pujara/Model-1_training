<!DOCTYPE html>
<html>
<head>
    <title>Playable Tic Tac Toe</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#4facfe,#00f2fe);
            font-family:Arial, sans-serif;
        }

        .game{
            text-align:center;
        }

        h1{
            color:white;
            margin-bottom:20px;
            font-size:40px;
        }

        #status{
            color:white;
            font-size:24px;
            margin-bottom:20px;
        }

        .board{
            display:grid;
            grid-template-columns:repeat(3,120px);
            grid-template-rows:repeat(3,120px);
            gap:10px;
        }

        .cell{
            background:white;
            border-radius:15px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:50px;
            font-weight:bold;
            cursor:pointer;

            transition:0.3s;
        }

        .cell:hover{
            background:#dff9fb;
            transform:scale(1.05);
        }

        .x{
            color:red;
        }

        .o{
            color:blue;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            border-radius:10px;
            background:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#dff9fb;
        }

    </style>
</head>

<body>

    <div class="game">

        <h1>Tic Tac Toe</h1>

        <div id="status">Player X Turn</div>

        <div class="board">

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>

        </div>

        <button onclick="restartGame()">Restart Game</button>

    </div>

    <script>

        let cells = document.querySelectorAll(".cell");
        let statusText = document.getElementById("status");
        let currentPlayer = "X";
        let gameActive = true;
        let board = ["", "", "", "", "", "", "", "", ""];
        const winPatterns = [
            [0,1,2],
            [3,4,5],
            [6,7,8],

            [0,3,6],
            [1,4,7],
            [2,5,8],

            [0,4,8],
            [2,4,6]
        ];

        cells.forEach((cell,index)=>{
            cell.addEventListener("click", ()=>cellClick(cell,index));
        });

        function cellClick(cell,index){

            if(board[index] != "" || !gameActive){
                return;
            }

            board[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());
            checkWinner();
        }

        function checkWinner(){
            let winner = false;
            
            for(let pattern of winPatterns){

                let a = board[pattern[0]];
                let b = board[pattern[1]];
                let c = board[pattern[2]];

                if(a == "" || b == "" || c == ""){
                    continue;
                }

                if(a == b && b == c){

                    winner = true;
                    break;
                }
            }

            if(winner){

                statusText.textContent = "Player " + currentPlayer + " Wins!";

                gameActive = false;

                return;
            }

            if(!board.includes("")){

                statusText.textContent = "Match Draw!";

                gameActive = false;

                return;
            }

            currentPlayer = currentPlayer == "X" ? "O" : "X";

            statusText.textContent = "Player " + currentPlayer + " Turn";

        }

        function restartGame(){

            board = ["", "", "", "", "", "", "", "", ""];

            currentPlayer = "X";

            gameActive = true;

            statusText.textContent = "Player X Turn";

            cells.forEach(cell=>{

                cell.textContent = "";

                cell.classList.remove("x","o");

            });

        }

    </script>

</body>
</html>
