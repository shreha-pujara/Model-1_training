<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT3k2ORyjKmNj93JNic0Hiql74lW3nCXnzzZA&s" alt="">
        <h1>Silver Oak University</h1>
    </header>
    <h2 align="center">Student Registration</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </nav>
    <br>
    <main>
        <article>
            <form style="border:2px solid gray; padding:20px;">
                <table cellpadding="8">
                    <tr>
                        <td>Name :</td>
                        <td><input type="text" name="name" required></td>
                    </tr>
                    <tr>
                        <td>Enrollment No :</td>
                        <td><input type="text" name="enrollment" maxlength="12" required></td>
                    </tr>
                    <tr>
                        <td>Branch :</td>
                        <td>
                            <select>
                                <option>Select Branch</option>
                                <option>CSE</option>
                                <option>CE</option>
                                <option>IT</option>
                                <option>CE-CS</option> 
                                <option>CE-AIML</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Division :</td>
                        <td><input type="text" maxlength="1" required></td>
                    </tr>
                    <tr>
                        <td>Gender :</td>
                        <td>
                            <input type="radio" name="gender"> Male
                            <input type="radio" name="gender"> Female
                        </td>
                    </tr>
                    <tr>
                        <td>Mobile No :</td>
                        <td><input type="tel" maxlength="10" required></td>
                    </tr>
                    <tr>
                        <td>Email ID :</td>
                        <td><input type="email" required></td>
                    </tr>
                    <tr>
                        <td>Password :</td>
                        <td><input type="password" required></td>
                    </tr>
                    <tr>
                        <td>Photo :</td>
                        <td><input type="file" required></td>
                    </tr>
                    <tr>
                        <td>Remarks :</td>
                        <td><textarea rows="4"></textarea></td>
                    </tr>
                    <tr>
                        <td>
                            <!-- Inline CSS -->
                            <input type="submit" value="Submit"
                                style="background-color:rgb(5, 88, 33); color:rgb(255, 255, 255);">
                        </td>
                        <td>
                            <input type="reset" value="Clear"
                                style="background-color:rgb(255, 0, 0); color:white;">
                        </td>
                    </tr>
                </table>
            </form>
        </article>
    </main>
    <footer>
        <p>© 2026 SOU College Registration System</p>
    </footer>
</body>
</html>
