<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Image Slider</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#111;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .carousel{
            width:900px;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,0.5);
        }

        .carousel img{
            height:500px;
            object-fit:cover;
        }

        .carousel-caption{
            background:rgba(0,0,0,0.5);
            border-radius:15px;
            padding:15px;
        }

        .carousel-caption h2{
            font-size:40px;
        }

        .carousel-caption p{
            font-size:18px;
        }

    </style>
</head>

<body>

    <!-- Bootstrap Carousel -->
    <div id="slider" class="carousel slide" data-bs-ride="carousel">

        <!-- Indicators -->
        <div class="carousel-indicators">

            <button type="button" data-bs-target="#slider"
            data-bs-slide-to="0" class="active"></button>

            <button type="button" data-bs-target="#slider"
            data-bs-slide-to="1"></button>

            <button type="button" data-bs-target="#slider"
            data-bs-slide-to="2"></button>

        </div>

        <!-- Images -->
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
                class="d-block w-100">

                <div class="carousel-caption">
                    <h2>Nature</h2>
                    <p>Beautiful Mountain View</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e"
                class="d-block w-100">

                <div class="carousel-caption">
                    <h2>Forest</h2>
                    <p>Green Forest Scenery</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1519608487953-e999c86e7455"
                class="d-block w-100">

                <div class="carousel-caption">
                    <h2>Ocean</h2>
                    <p>Peaceful Ocean Waves</p>
                </div>
            </div>

        </div>

        <!-- Previous Button -->
        <button class="carousel-control-prev"
        type="button"
        data-bs-target="#slider"
        data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <!-- Next Button -->
        <button class="carousel-control-next"
        type="button"
        data-bs-target="#slider"
        data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
