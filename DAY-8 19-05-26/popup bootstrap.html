<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Popup Modal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#141e30,#243b55);
        }

        .btn-custom{
            padding:15px 35px;
            font-size:20px;
            border:none;
            border-radius:40px;
            background:#ff1744;
            color:white;
            transition:0.4s;
        }

        .btn-custom:hover{
            background:white;
            color:#ff1744;
            transform:scale(1.1);
        }

        .modal-content{
            border-radius:20px;
            overflow:hidden;
        }

        .modal-header{
            background:#ff1744;
            color:white;
        }

        .modal-body{
            text-align:center;
            padding:40px;
        }

        .modal-body h2{
            margin-bottom:15px;
        }

    </style>
</head>

<body>

    <!-- Button -->
    <button class="btn-custom" data-bs-toggle="modal" data-bs-target="#popup">
        Open Popup
    </button>

    <!-- Modal -->
    <div class="modal fade" id="popup">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <!-- Header -->
                <div class="modal-header">

                    <h5 class="modal-title">Bootstrap Popup</h5>

                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>

                </div>

                <!-- Body -->
                <div class="modal-body">

                    <h2>Hello User 👋</h2>

                    <p>
                        This is a Bootstrap popup modal box using HTML and CSS.
                    </p>

                    <button class="btn btn-danger mt-3" data-bs-dismiss="modal">
                        Close
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
