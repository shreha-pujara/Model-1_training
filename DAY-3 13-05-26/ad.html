<!DOCTYPE html>
<html>
<head>
    <title>Coaching Class Advertisement</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f2f2f2;
        }

        .ad-container{
            width:600px;
            margin:40px auto;
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0px 0px 15px gray;
            text-align:center;
        }

        .ad-container img{
            width:100%;
            height:300px;
            object-fit:cover;
        }

        .content{
            padding:25px;
        }

        h1{
            color:darkblue;
            font-size:40px;
        }

        h2{
            color:red;
            font-size:28px;
        }

        p{
            font-size:20px;
            color:#333;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:orange;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:20px;
        }

        .btn:hover{
            background:darkblue;
        }

    </style>
</head>

<body>

    <div class="ad-container">

        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" alt="Coaching Class">

        <div class="content">

            <h1>Bright Future Coaching Classes</h1>

            <h2>Admissions Open 2026</h2>

            <p>
                Expert Faculty | Weekly Tests | Smart Classes
            </p>

            <p>
                Special batches for 10th, 12th & Competitive Exams
            </p>

            <a href="#" class="btn">Enroll Now</a>

        </div>

    </div>

</body>
</html>
